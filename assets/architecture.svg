<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 450" font-family='-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif'>
  <style>
    .flow { stroke-dasharray: 7 7; animation: dash 1.4s linear infinite; }
    .flow-opt { stroke-dasharray: 4 10; animation: dash 2.2s linear infinite; }
    .flow-back { stroke-dasharray: 5 9; animation: dash 2.8s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -28; } }
    .future { animation: pulse 3.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.95; } }
    .apply-node { animation: glow 3.2s ease-in-out infinite; }
    @keyframes glow { 0%, 100% { filter: none; } 50% { filter: drop-shadow(0 0 7px #1f6feb); } }
    .blob-a { animation: breathe 9s ease-in-out infinite; }
    .blob-b { animation: breathe 11s ease-in-out infinite reverse; }
    @keyframes breathe { 0%, 100% { opacity: 0.28; } 50% { opacity: 0.55; } }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <marker id="aBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d29922"/>
    </marker>
    <marker id="aGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#21262d"/>
    </pattern>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8957e5" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8957e5" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame"><rect x="0" y="0" width="920" height="450" rx="12"/></clipPath>
  </defs>

  <rect x="0" y="0" width="920" height="450" rx="12" fill="#0d1117"/>
  <g clip-path="url(#frame)">
    <circle class="blob-a" cx="120" cy="40" r="300" fill="url(#glowBlue)"/>
    <circle class="blob-b" cx="820" cy="420" r="320" fill="url(#glowPurple)"/>
    <rect x="0" y="0" width="920" height="450" fill="url(#dots)"/>
  </g>
  <rect x="0.5" y="0.5" width="919" height="449" rx="12" fill="none" stroke="#30363d"/>

  <!-- left: repo -->
  <rect x="36" y="40" width="290" height="320" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="56" y="68" fill="#e6edf3" font-size="14" font-weight="600" class="mono">claude-harness <tspan fill="#8b949e" font-size="11" font-weight="400">(git)</tspan></text>

  <rect x="56" y="82" width="250" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="68" y="100" class="mono" fill="#79c0ff" font-size="12">skills/&lt;name&gt;/</text>
  <text x="68" y="115" fill="#8b949e" font-size="10">SKILL.md + references/ + scripts/</text>

  <rect x="56" y="132" width="250" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="68" y="150" class="mono" fill="#79c0ff" font-size="12">skills/&lt;name&gt;/</text>
  <text x="68" y="165" fill="#8b949e" font-size="10">SKILL.md + references/ + scripts/</text>

  <g class="future">
    <rect x="56" y="182" width="250" height="42" rx="6" fill="none" stroke="#3fb950" stroke-dasharray="4 4"/>
    <text x="68" y="200" class="mono" fill="#3fb950" font-size="12">skills/&lt;new&gt;/</text>
    <text x="68" y="215" fill="#3fb950" font-size="10">追加はディレクトリを置くだけ</text>
  </g>

  <rect x="56" y="240" width="250" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="68" y="258" class="mono" fill="#d2a8ff" font-size="12">claude-md/&lt;name&gt;.md</text>
  <text x="68" y="273" fill="#8b949e" font-size="10">常時ルール化したいスキルのみ</text>

  <rect x="56" y="290" width="250" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="68" y="308" class="mono" fill="#e3b341" font-size="12">references/*.md (frontmatter)</text>
  <text x="68" y="323" fill="#8b949e" font-size="10">source: 原典リポジトリの URL</text>

  <!-- center: apply -->
  <g class="apply-node">
    <rect x="390" y="176" width="140" height="46" rx="10" fill="#1f6feb"/>
    <text x="460" y="205" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">展開</text>
  </g>
  <text x="460" y="242" text-anchor="middle" fill="#8b949e" font-size="11">冪等 — 何度実行しても同じ状態</text>

  <path d="M 326 199 L 384 199" fill="none" stroke="#8b949e" stroke-width="1.6" class="flow" marker-end="url(#aGray)"/>

  <!-- right: ~/.claude -->
  <rect x="594" y="40" width="290" height="320" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="614" y="68" fill="#e6edf3" font-size="14" font-weight="600" class="mono">~/.claude/</text>

  <rect x="614" y="90" width="250" height="44" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="626" y="108" class="mono" fill="#79c0ff" font-size="12">skills/&lt;name&gt;</text>
  <text x="626" y="124" fill="#8b949e" font-size="10">リポジトリへの symlink</text>

  <rect x="614" y="176" width="250" height="44" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="626" y="194" class="mono" fill="#7ee787" font-size="12">CLAUDE.md</text>
  <text x="626" y="210" fill="#8b949e" font-size="10">managed:&lt;name&gt; ブロックを挿入・置換</text>

  <rect x="614" y="262" width="250" height="44" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="626" y="280" class="mono" fill="#e3b341" font-size="12">references/</text>
  <text x="626" y="296" fill="#8b949e" font-size="10">原典 clone (履歴付き・blob は必要時取得)</text>

  <path d="M 530 186 C 566 172, 574 130, 608 112" fill="none" stroke="#58a6ff" stroke-width="1.6" class="flow" marker-end="url(#aBlue)"/>
  <path d="M 530 199 L 608 198" fill="none" stroke="#3fb950" stroke-width="1.6" class="flow" marker-end="url(#aGreen)"/>
  <path d="M 530 212 C 566 226, 574 264, 608 284" fill="none" stroke="#d29922" stroke-width="1.6" class="flow-opt" marker-end="url(#aAmber)"/>
  <text x="500" y="298" fill="#d29922" font-size="10" class="mono">--with-references</text>

  <!-- back: git pull -->
  <path d="M 700 372 C 560 416, 360 416, 222 374" fill="none" stroke="#8b949e" stroke-width="1.4" class="flow-back" marker-end="url(#aGray)"/>
  <text x="460" y="434" text-anchor="middle" fill="#8b949e" font-size="12">スキル本体は symlink — 変更の配布は git pull だけで全環境に反映</text>
</svg>
